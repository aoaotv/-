<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>車載HUD時計</title>
  <style>
    :root {
      --top-inset: 12%;
      --bottom-inset: 2%;
      --clock-size: 25vw;
      --hud-height: 68vh;
      --hud-y: 0px;
      --brightness: 1;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: manipulation;
    }

    body {
      display: grid;
      place-items: center;
    }

    #hud {
      width: 94vw;
      height: var(--hud-height);
      display: grid;
      place-items: center;
      transform: translateY(var(--hud-y));
      clip-path: polygon(
        var(--top-inset) 0,
        calc(100% - var(--top-inset)) 0,
        calc(100% - var(--bottom-inset)) 100%,
        var(--bottom-inset) 100%
      );
      background: #000;
      filter: brightness(var(--brightness));
    }

    #clock {
      font-size: clamp(70px, var(--clock-size), 330px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: .03em;
      white-space: nowrap;
      transform: scaleX(-1);
      text-shadow: 0 0 12px rgba(255,255,255,.35);
      user-select: none;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255,255,255,.35);
      white-space: nowrap;
      transition: opacity .4s;
      pointer-events: none;
    }

    #panel {
      position: fixed;
      inset: auto 12px 12px 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(24,24,24,.96);
      border: 1px solid rgba(255,255,255,.15);
      display: none;
      gap: 10px;
      z-index: 10;
      box-shadow: 0 10px 35px rgba(0,0,0,.5);
    }

    #panel.open {
      display: grid;
    }

    .row {
      display: grid;
      grid-template-columns: 88px 1fr 45px;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px;
      font-size: 15px;
      background: #333;
      color: #fff;
    }

    button.primary {
      background: #0a84ff;
    }

    @media (orientation: portrait) {
      #hud {
        width: 96vw;
      }

      #clock {
        font-size: 22vw;
      }
    }
  </style>
</head>
<body>
  <main id="hud" aria-label="HUD時計">
    <div id="clock">00:00</div>
  </main>

  <div id="hint">画面をタップすると形を調整できます</div>

  <section id="panel">
    <div class="row">
      <label for="top">上の幅</label>
      <input id="top" type="range" min="0" max="35" value="12">
      <span id="topVal">12%</span>
    </div>

    <div class="row">
      <label for="bottom">下の幅</label>
      <input id="bottom" type="range" min="0" max="35" value="2">
      <span id="bottomVal">2%</span>
    </div>

    <div class="row">
      <label for="size">文字サイズ</label>
      <input id="size" type="range" min="12" max="34" value="25">
      <span id="sizeVal">25</span>
    </div>

    <div class="row">
      <label for="height">表示の高さ</label>
      <input id="height" type="range" min="35" max="95" value="68">
      <span id="heightVal">68</span>
    </div>

    <div class="row">
      <label for="y">上下位置</label>
      <input id="y" type="range" min="-160" max="160" value="0">
      <span id="yVal">0</span>
    </div>

    <div class="row">
      <label for="bright">明るさ</label>
      <input id="bright" type="range" min="30" max="160" value="100">
      <span id="brightVal">100</span>
    </div>

    <div class="buttons">
      <button id="seconds">秒を表示</button>
      <button id="close" class="primary">完了</button>
    </div>
  </section>

  <script>
    const clock = document.getElementById("clock");
    const hud = document.getElementById("hud");
    const panel = document.getElementById("panel");
    const hint = document.getElementById("hint");
    let showSeconds = false;

    const settings = {
      top: document.getElementById("top"),
      bottom: document.getElementById("bottom"),
      size: document.getElementById("size"),
      height: document.getElementById("height"),
      y: document.getElementById("y"),
      bright: document.getElementById("bright")
    };

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      clock.textContent = showSeconds ? `${h}:${m}:${s}` : `${h}:${m}`;
    }

    function applySettings() {
      const top = settings.top.value;
      const bottom = settings.bottom.value;
      const size = settings.size.value;
      const height = settings.height.value;
      const y = settings.y.value;
      const bright = settings.bright.value;

      document.documentElement.style.setProperty("--top-inset", `${top}%`);
      document.documentElement.style.setProperty("--bottom-inset", `${bottom}%`);
      document.documentElement.style.setProperty("--clock-size", `${size}vw`);
      document.documentElement.style.setProperty("--hud-height", `${height}vh`);
      document.documentElement.style.setProperty("--hud-y", `${y}px`);
      document.documentElement.style.setProperty("--brightness", bright / 100);

      document.getElementById("topVal").textContent = `${top}%`;
      document.getElementById("bottomVal").textContent = `${bottom}%`;
      document.getElementById("sizeVal").textContent = size;
      document.getElementById("heightVal").textContent = height;
      document.getElementById("yVal").textContent = y;
      document.getElementById("brightVal").textContent = bright;

      localStorage.setItem("hudClockSettings", JSON.stringify({
        top, bottom, size, height, y, bright, showSeconds
      }));
    }

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem("hudClockSettings"));
        if (!saved) return;

        Object.keys(settings).forEach(key => {
          if (saved[key] !== undefined) settings[key].value = saved[key];
        });

        showSeconds = Boolean(saved.showSeconds);
        document.getElementById("seconds").textContent =
          showSeconds ? "秒を隠す" : "秒を表示";
      } catch (_) {}
    }

    Object.values(settings).forEach(input => {
      input.addEventListener("input", applySettings);
    });

    hud.addEventListener("click", () => {
      panel.classList.add("open");
      hint.style.opacity = "0";
    });

    document.getElementById("close").addEventListener("click", () => {
      panel.classList.remove("open");
    });

    document.getElementById("seconds").addEventListener("click", () => {
      showSeconds = !showSeconds;
      document.getElementById("seconds").textContent =
        showSeconds ? "秒を隠す" : "秒を表示";
      applySettings();
      updateClock();
    });

    loadSettings();
    applySettings();
    updateClock();
    setInterval(updateClock, 250);

    setTimeout(() => {
      if (!panel.classList.contains("open")) hint.style.opacity = "0";
    }, 5000);
  </script>
</body>
</html>
