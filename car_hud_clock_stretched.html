<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
html,body{
margin:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
#clock{
color:#fff;
font-weight:900;
font-size:22vw;
white-space:nowrap;

/* ガラス反射用 */
transform:
scaleX(-1)
scaleY(1.7)
scaleX(1.35);

transform-origin:center center;

text-shadow:0 0 12px rgba(255,255,255,.4);
letter-spacing:0.03em;
}
</style>
</head>
<body>
<div id="clock"></div>
<script>
function u(){
const d=new Date();
clock.textContent=
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0")+":"+
String(d.getSeconds()).padStart(2,"0");
}
u();
setInterval(u,100);
</script>
</body>
</html>
