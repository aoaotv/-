<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>居眠り警報カメラ（実験用）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: #f7f9ff;
      background: #07101f;
    }
    .app {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: auto;
      padding: max(18px, env(safe-area-inset-top)) 16px
        max(24px, env(safe-area-inset-bottom));
    }
    h1 {
      margin: 4px 0 6px;
      font-size: clamp(24px, 6vw, 36px);
    }
    .warning {
      margin: 0 0 16px;
      padding: 12px 14px;
      border: 1px solid #5f4b12;
      border-radius: 14px;
      color: #ffe69a;
      background: #2a230e;
      line-height: 1.55;
      font-size: 13px;
    }
    .camera {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      border-radius: 24px;
      background: #111a2a;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .camera::after {
      content: "";
      position: absolute;
      inset: 15%;
      border: 2px dashed rgba(255,255,255,.38);
      border-radius: 45%;
      pointer-events: none;
    }
    .badge {
      position: absolute;
      z-index: 2;
      top: 14px;
      left: 14px;
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      background: rgba(6, 15, 30, .8);
      backdrop-filter: blur(10px);
    }
    .alarm-overlay {
      position: absolute;
      z-index: 3;
      inset: 0;
      display: none;
      place-items: center;
      text-align: center;
      background: rgba(190, 0, 15, .82);
      animation: flash .55s infinite alternate;
    }
    .alarm-overlay.show { display: grid; }
    .alarm-overlay strong {
      display: block;
      font-size: clamp(42px, 13vw, 86px);
    }
    .alarm-overlay span {
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 800;
    }
    @keyframes flash {
      from { opacity: .72; }
      to { opacity: 1; }
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0;
    }
    .status-card {
      min-width: 0;
      padding: 13px 10px;
      text-align: center;
      border: 1px solid #25344f;
      border-radius: 16px;
      background: #101b2f;
    }
    .status-card small {
      display: block;
      margin-bottom: 6px;
      color: #9eabc2;
      font-size: 11px;
    }
    .status-card b {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: clamp(15px, 4vw, 21px);
      white-space: nowrap;
    }
    .controls {
      padding: 17px;
      border: 1px solid #25344f;
      border-radius: 20px;
      background: #101b2f;
    }
    .slider-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    .slider-row label { font-weight: 700; }
    input[type="range"] {
      grid-column: 1 / -1;
      width: 100%;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      min-height: 52px;
      border: 0;
      border-radius: 15px;
      color: white;
      font-size: 16px;
      font-weight: 850;
      cursor: pointer;
      background: #1b67f1;
    }
    button.secondary { background: #293851; }
    button.stop { background: #b51c2f; }
    button:disabled {
      cursor: not-allowed;
      opacity: .5;
    }
    .note {
      margin: 13px 3px 0;
      color: #98a6bc;
      font-size: 12px;
      line-height: 1.6;
    }
    @media (max-width: 430px) {
      .status-grid { grid-template-columns: 1fr 1fr; }
      .status-card:last-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>居眠り警報カメラ</h1>
    <p class="warning">
      ⚠️ これは工作・実験用の試作品です。誤検知や見逃しがあります。
      実際の運転中に、このHTMLだけを安全装置として使わないでください。
    </p>

    <section class="camera">
      <video id="video" autoplay playsinline muted></video>
      <div id="badge" class="badge">停止中</div>
      <div id="alarmOverlay" class="alarm-overlay">
        <div>
          <strong>⚠️</strong>
          <span>目を開けて！</span>
        </div>
      </div>
    </section>

    <section class="status-grid">
      <div class="status-card">
        <small>顔</small>
        <b id="faceStatus">未確認</b>
      </div>
      <div class="status-card">
        <small>目の状態</small>
        <b id="eyeStatus">未確認</b>
      </div>
      <div class="status-card">
        <small>閉眼時間</small>
        <b id="closedTime">0.0 秒</b>
      </div>
    </section>

    <section class="controls">
      <div class="slider-row">
        <label for="delay">警報までの時間</label>
        <output id="delayValue">1.5秒</output>
        <input id="delay" type="range" min="0.7" max="4" step="0.1" value="1.5">
      </div>

      <div class="slider-row">
        <label for="sensitivity">目閉じ判定の感度</label>
        <output id="sensitivityValue">0.55</output>
        <input id="sensitivity" type="range" min="0.3" max="0.85" step="0.01" value="0.55">
      </div>

      <div class="buttons">
        <button id="startButton">カメラ開始</button>
        <button id="testButton" class="secondary">警報テスト</button>
      </div>
    </section>

    <p class="note">
      前面カメラと顔認識用データを使います。映像はこのページ内で処理し、
      このHTMLからサーバーへ保存・送信する処理は入れていません。
      カメラはHTTPSのサイト上、または対応ブラウザのローカル環境で使用してください。
      初回はAIデータの読み込みにインターネット接続が必要です。
    </p>
  </main>

  <script type="module">
    import {
      FaceLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304";

    const video = document.getElementById("video");
    const startButton = document.getElementById("startButton");
    const testButton = document.getElementById("testButton");
    const badge = document.getElementById("badge");
    const faceStatus = document.getElementById("faceStatus");
    const eyeStatus = document.getElementById("eyeStatus");
    const closedTimeText = document.getElementById("closedTime");
    const alarmOverlay = document.getElementById("alarmOverlay");
    const delaySlider = document.getElementById("delay");
    const delayValue = document.getElementById("delayValue");
    const sensitivitySlider = document.getElementById("sensitivity");
    const sensitivityValue = document.getElementById("sensitivityValue");

    let faceLandmarker = null;
    let stream = null;
    let running = false;
    let closedSince = null;
    let alarmActive = false;
    let audioContext = null;
    let alarmTimer = null;
    let lastVideoTime = -1;

    delaySlider.addEventListener("input", () => {
      delayValue.textContent = `${Number(delaySlider.value).toFixed(1)}秒`;
    });

    sensitivitySlider.addEventListener("input", () => {
      sensitivityValue.textContent = Number(sensitivitySlider.value).toFixed(2);
    });

    function setBadge(text, color = "rgba(6,15,30,.8)") {
      badge.textContent = text;
      badge.style.background = color;
    }

    async function loadModel() {
      if (faceLandmarker) return;

      setBadge("AIを読み込み中…");
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/wasm"
      );

      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numFaces: 1,
        outputFaceBlendshapes: true
      });
    }

    async function startCamera() {
      try {
        startButton.disabled = true;
        await loadModel();

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        running = true;
        closedSince = null;
        lastVideoTime = -1;
        startButton.textContent = "カメラ停止";
        startButton.classList.add("stop");
        startButton.disabled = false;
        setBadge("監視中", "rgba(17,126,68,.88)");
        detectLoop();
      } catch (error) {
        console.error(error);
        running = false;
        startButton.disabled = false;
        setBadge("開始できません", "rgba(181,28,47,.9)");
        alert(
          "カメラを開始できませんでした。\n\n" +
          "・カメラの許可をオンにする\n" +
          "・HTTPSのページで開く\n" +
          "・インターネット接続を確認する\n\n" +
          "エラー: " + error.message
        );
      }
    }

    function stopCamera() {
      running = false;
      stopAlarm();

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      closedSince = null;
      faceStatus.textContent = "未確認";
      eyeStatus.textContent = "未確認";
      closedTimeText.textContent = "0.0 秒";
      startButton.textContent = "カメラ開始";
      startButton.classList.remove("stop");
      setBadge("停止中");
    }

    startButton.addEventListener("click", async () => {
      if (running) stopCamera();
      else await startCamera();
    });

    function getBlendshape(categories, name) {
      return categories.find(item => item.categoryName === name)?.score ?? 0;
    }

    function detectLoop() {
      if (!running) return;

      if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        const now = performance.now();
        const result = faceLandmarker.detectForVideo(video, now);
        const blendshapes = result.faceBlendshapes?.[0]?.categories;

        if (!blendshapes) {
          faceStatus.textContent = "見つからない";
          eyeStatus.textContent = "判定不能";
          closedSince = null;
          closedTimeText.textContent = "0.0 秒";
          if (alarmActive) stopAlarm();
        } else {
          faceStatus.textContent = "検出中";

          const leftBlink = getBlendshape(blendshapes, "eyeBlinkLeft");
          const rightBlink = getBlendshape(blendshapes, "eyeBlinkRight");
          const blinkScore = (leftBlink + rightBlink) / 2;
          const threshold = Number(sensitivitySlider.value);
          const eyesClosed = blinkScore >= threshold;

          if (eyesClosed) {
            eyeStatus.textContent = "閉じている";
            eyeStatus.style.color = "#ff9ba7";

            if (closedSince === null) closedSince = now;
            const seconds = (now - closedSince) / 1000;
            closedTimeText.textContent = `${seconds.toFixed(1)} 秒`;

            if (seconds >= Number(delaySlider.value)) {
              startAlarm();
            }
          } else {
            eyeStatus.textContent = "開いている";
            eyeStatus.style.color = "#8dffc0";
            closedSince = null;
            closedTimeText.textContent = "0.0 秒";
            if (alarmActive) stopAlarm();
          }
        }
      }

      requestAnimationFrame(detectLoop);
    }

    function beep() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(930, audioContext.currentTime);
      gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.35, audioContext.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.28);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.3);

      if (navigator.vibrate) navigator.vibrate([250, 100, 250]);
    }

    function startAlarm() {
      if (alarmActive) return;
      alarmActive = true;
      alarmOverlay.classList.add("show");
      setBadge("警報！", "rgba(181,28,47,.95)");
      beep();
      alarmTimer = setInterval(beep, 650);
    }

    function stopAlarm() {
      alarmActive = false;
      alarmOverlay.classList.remove("show");
      clearInterval(alarmTimer);
      alarmTimer = null;
      if (running) setBadge("監視中", "rgba(17,126,68,.88)");
    }

    testButton.addEventListener("click", () => {
      startAlarm();
      setTimeout(stopAlarm, 3000);
    });

    window.addEventListener("pagehide", stopCamera);
  </script>
</body>
</html>
