<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#070707" />
  <title>超高感度 揺れ警報</title>
  <style>
    :root{
      --bg:#070707;
      --panel:#151515;
      --text:#fff;
      --sub:#bdbdbd;
      --accent:#ff3b30;
      --ok:#30d158;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      min-height:100vh;
      min-height:100dvh;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
      overflow:hidden;
    }
    .app{
      width:min(760px,100%);
      display:grid;
      gap:14px;
    }
    h1{
      font-size:clamp(30px,8vw,64px);
      margin:0;
      text-align:center;
      letter-spacing:.03em;
    }
    .status{
      text-align:center;
      font-size:clamp(18px,4vw,28px);
      font-weight:800;
      color:var(--sub);
      min-height:1.5em;
    }
    .panel{
      background:var(--panel);
      border:1px solid #2c2c2c;
      border-radius:24px;
      padding:18px;
      box-shadow:0 12px 40px rgba(0,0,0,.35);
    }
    .meter{
      height:28px;
      border-radius:999px;
      background:#242424;
      overflow:hidden;
      border:1px solid #363636;
    }
    .meter > div{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#30d158,#ffd60a,#ff453a);
      transition:width .05s linear;
    }
    .numbers{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-top:10px;
      color:var(--sub);
      font-variant-numeric:tabular-nums;
      font-size:15px;
    }
    .row{
      display:grid;
      gap:10px;
      margin-top:16px;
    }
    label{
      font-weight:800;
      font-size:18px;
    }
    input[type=range]{
      width:100%;
      accent-color:var(--accent);
    }
    .hint{
      color:var(--sub);
      font-size:14px;
      line-height:1.55;
    }
    .buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    button{
      border:0;
      border-radius:20px;
      padding:18px 12px;
      font-size:22px;
      font-weight:900;
      color:#fff;
      cursor:pointer;
    }
    #startBtn{background:var(--ok);color:#001c08}
    #testBtn{background:#0a84ff}
    #stopBtn{
      display:none;
      background:#fff;
      color:#000;
      font-size:28px;
      padding:22px;
    }
    .small{
      text-align:center;
      color:#8e8e93;
      font-size:13px;
    }

    #alarmScreen{
      position:fixed;
      inset:0;
      z-index:9999;
      display:none;
      background:#ff0000;
      color:#fff;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:24px;
      animation:flash .35s infinite alternate;
    }
    #alarmScreen.active{display:flex}
    #alarmTitle{
      font-size:clamp(54px,15vw,150px);
      font-weight:1000;
      line-height:.95;
      text-shadow:0 5px 0 rgba(0,0,0,.25);
    }
    #alarmSub{
      margin-top:24px;
      font-size:clamp(20px,5vw,40px);
      font-weight:900;
    }
    #alarmScreen #stopBtn{
      display:block;
      width:min(520px,90%);
      margin-top:38px;
      border:6px solid #000;
    }
    @keyframes flash{
      from{background:#ff0000}
      to{background:#7a0000}
    }
    @media (max-width:520px){
      .buttons{grid-template-columns:1fr}
      .panel{padding:16px;border-radius:20px}
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>揺れ警報</h1>
    <div id="status" class="status">停止中</div>

    <section class="panel">
      <div class="meter"><div id="meterBar"></div></div>
      <div class="numbers">
        <span>現在: <b id="motionValue">0.0000</b></span>
        <span>最大: <b id="maxValue">0.0000</b></span>
      </div>

      <div class="row">
        <label for="sensitivity">感度: <span id="sensitivityLabel">最高</span></label>
        <input id="sensitivity" type="range" min="1" max="100" value="95" />
        <div class="hint">
          右にするほど敏感。最高付近では、足音・車・風・ドアへの接触でも鳴ることがあります。
        </div>
      </div>

      <div class="row">
        <label for="delay">連続検知時間: <span id="delayLabel">0.05秒</span></label>
        <input id="delay" type="range" min="1" max="30" value="3" />
        <div class="hint">
          瞬間的なノイズを無視したい場合は長めにします。
        </div>
      </div>
    </section>

    <div class="buttons">
      <button id="startBtn">検知開始</button>
      <button id="testBtn">警報テスト</button>
    </div>

    <button id="stopBtn">警報を止める</button>

    <div class="small">
      iPhoneの音量を最大にして、マナーモードを解除してください。画面を閉じると停止する場合があります。
    </div>
  </main>

  <div id="alarmScreen" aria-live="assertive">
    <div id="alarmTitle">揺れを検知！</div>
    <div id="alarmSub">ドア・周囲を確認してください</div>
    <button id="alarmStopBtn">警報を止める</button>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const testBtn = document.getElementById('testBtn');
    const stopBtn = document.getElementById('stopBtn');
    const alarmStopBtn = document.getElementById('alarmStopBtn');
    const alarmScreen = document.getElementById('alarmScreen');
    const statusEl = document.getElementById('status');
    const motionValue = document.getElementById('motionValue');
    const maxValue = document.getElementById('maxValue');
    const meterBar = document.getElementById('meterBar');
    const sensitivity = document.getElementById('sensitivity');
    const sensitivityLabel = document.getElementById('sensitivityLabel');
    const delay = document.getElementById('delay');
    const delayLabel = document.getElementById('delayLabel');

    let running = false;
    let alarmActive = false;
    let audioCtx = null;
    let sirenTimer = null;
    let wakeLock = null;

    let baseline = null;
    let previous = null;
    let calibrationSamples = [];
    let maxMotion = 0;
    let overThresholdSince = null;
    let lastAlarmTime = 0;

    function thresholdFromSensitivity() {
      const s = Number(sensitivity.value);
      // 1 = 鈍感 / 100 = 超高感度
      return 0.45 - (s / 100) * 0.444;
    }

    function requiredDuration() {
      return Number(delay.value) * 0.0167;
    }

    function updateLabels() {
      const s = Number(sensitivity.value);
      sensitivityLabel.textContent =
        s >= 95 ? '最高' :
        s >= 80 ? 'かなり高い' :
        s >= 60 ? '高い' :
        s >= 40 ? '普通' : '低い';

      delayLabel.textContent = requiredDuration().toFixed(2) + '秒';
    }

    sensitivity.addEventListener('input', updateLabels);
    delay.addEventListener('input', updateLabels);
    updateLabels();

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (_) {}
    }

    function createAudio() {
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function beep(frequency, duration, volume=1) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = frequency;
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function startSiren() {
      createAudio();
      stopSiren();

      let high = false;
      const pulse = () => {
        if (!alarmActive) return;
        high = !high;
        beep(high ? 1700 : 850, 0.35, 1);
        if (navigator.vibrate) navigator.vibrate([250, 80, 250]);
      };
      pulse();
      sirenTimer = setInterval(pulse, 320);
    }

    function stopSiren() {
      if (sirenTimer) {
        clearInterval(sirenTimer);
        sirenTimer = null;
      }
      if (navigator.vibrate) navigator.vibrate(0);
    }

    function triggerAlarm() {
      const now = Date.now();
      if (alarmActive || now - lastAlarmTime < 1000) return;
      lastAlarmTime = now;
      alarmActive = true;
      alarmScreen.classList.add('active');
      statusEl.textContent = '警報中';
      statusEl.style.color = '#ff453a';
      startSiren();
    }

    function stopAlarm() {
      alarmActive = false;
      alarmScreen.classList.remove('active');
      stopSiren();
      statusEl.textContent = running ? '検知中' : '停止中';
      statusEl.style.color = running ? '#30d158' : '#bdbdbd';
      overThresholdSince = null;
    }

    function getAcceleration(event) {
      const a = event.acceleration;
      if (a && a.x != null && a.y != null && a.z != null) {
        return { x: a.x || 0, y: a.y || 0, z: a.z || 0 };
      }

      const g = event.accelerationIncludingGravity;
      if (g && g.x != null && g.y != null && g.z != null) {
        return { x: g.x || 0, y: g.y || 0, z: g.z || 0 };
      }

      return null;
    }

    function vectorDiff(a, b) {
      return Math.sqrt(
        Math.pow(a.x - b.x, 2) +
        Math.pow(a.y - b.y, 2) +
        Math.pow(a.z - b.z, 2)
      );
    }

    function onMotion(event) {
      if (!running || alarmActive) return;

      const current = getAcceleration(event);
      if (!current) return;

      if (calibrationSamples.length < 120) {
        calibrationSamples.push(current);
        statusEl.textContent = `調整中 ${Math.round(calibrationSamples.length / 120 * 100)}%`;
        if (calibrationSamples.length === 120) {
          const sum = calibrationSamples.reduce((acc, v) => ({
            x: acc.x + v.x,
            y: acc.y + v.y,
            z: acc.z + v.z
          }), {x:0,y:0,z:0});
          baseline = {
            x: sum.x / calibrationSamples.length,
            y: sum.y / calibrationSamples.length,
            z: sum.z / calibrationSamples.length
          };
          previous = current;
          statusEl.textContent = '検知中';
          statusEl.style.color = '#30d158';
        }
        return;
      }

      const instantChange = previous ? vectorDiff(current, previous) : 0;
      const baselineChange = baseline ? vectorDiff(current, baseline) : 0;
      const score = Math.max(instantChange, baselineChange * 0.35);

      // ゆっくり基準値を追従させる
      baseline.x = baseline.x * 0.997 + current.x * 0.003;
      baseline.y = baseline.y * 0.997 + current.y * 0.003;
      baseline.z = baseline.z * 0.997 + current.z * 0.003;
      previous = current;

      motionValue.textContent = score.toFixed(4);
      maxMotion = Math.max(maxMotion, score);
      maxValue.textContent = maxMotion.toFixed(4);

      const threshold = thresholdFromSensitivity();
      const meterPercent = Math.min(100, (score / Math.max(threshold * 4, 0.02)) * 100);
      meterBar.style.width = meterPercent + '%';

      if (score >= threshold) {
        if (overThresholdSince === null) overThresholdSince = performance.now();
        const elapsed = (performance.now() - overThresholdSince) / 1000;
        if (elapsed >= requiredDuration()) triggerAlarm();
      } else {
        overThresholdSince = null;
      }
    }

    async function beginDetection() {
      createAudio();

      try {
        if (typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function') {
          const result = await DeviceMotionEvent.requestPermission();
          if (result !== 'granted') {
            alert('モーションセンサーの許可が必要です。');
            return;
          }
        }

        window.removeEventListener('devicemotion', onMotion);
        window.addEventListener('devicemotion', onMotion, { passive:true });

        running = true;
        alarmActive = false;
        baseline = null;
        previous = null;
        calibrationSamples = [];
        maxMotion = 0;
        overThresholdSince = null;

        maxValue.textContent = '0.0000';
        motionValue.textContent = '0.0000';
        meterBar.style.width = '0%';

        statusEl.textContent = '調整中 0%';
        statusEl.style.color = '#ffd60a';
        startBtn.textContent = '再調整';
        stopBtn.style.display = 'block';

        await requestWakeLock();
      } catch (err) {
        alert('センサーを開始できませんでした: ' + err.message);
      }
    }

    function stopDetection() {
      running = false;
      stopAlarm();
      window.removeEventListener('devicemotion', onMotion);
      statusEl.textContent = '停止中';
      statusEl.style.color = '#bdbdbd';
      startBtn.textContent = '検知開始';
      stopBtn.style.display = 'none';
      meterBar.style.width = '0%';
      if (wakeLock) {
        wakeLock.release().catch(()=>{});
        wakeLock = null;
      }
    }

    startBtn.addEventListener('click', beginDetection);
    testBtn.addEventListener('click', () => {
      createAudio();
      triggerAlarm();
    });
    stopBtn.addEventListener('click', stopDetection);
    alarmStopBtn.addEventListener('click', stopAlarm);

    document.addEventListener('visibilitychange', async () => {
      if (running && document.visibilityState === 'visible' && !wakeLock) {
        await requestWakeLock();
      }
    });
  </script>
</body>
</html>
