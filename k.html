<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#111111" />
  <title>連動火災警報パネル</title>
  <style>
    :root{
      --bg:#0b0b0d;
      --panel:#17171b;
      --text:#ffffff;
      --muted:#a7a7b0;
      --red:#e31818;
      --red2:#ff3b30;
      --green:#21c36a;
      --line:#2b2b31;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif}
    button,input,textarea,select{font:inherit}
    button{touch-action:manipulation}
    .screen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:22px}
    .screen.active{display:flex}
    .card{width:min(520px,100%);background:var(--panel);border:1px solid var(--line);border-radius:26px;padding:24px;box-shadow:0 20px 60px #0008}
    h1,h2,p{margin-top:0}
    h1{font-size:clamp(25px,6vw,38px);margin-bottom:8px}
    .sub{color:var(--muted);line-height:1.6;margin-bottom:20px}
    label{display:block;font-weight:700;margin:16px 0 8px}
    input,textarea,select{
      width:100%;border:1px solid #3a3a43;background:#0e0e11;color:#fff;
      border-radius:14px;padding:15px 16px;font-size:18px;outline:none
    }
    input:focus,textarea:focus,select:focus{border-color:#777}
    textarea{min-height:110px;resize:vertical}
    input[type="color"]{height:58px;padding:6px}
    .primary,.secondary,.danger,.cancel{
      width:100%;border:0;border-radius:16px;padding:16px;font-weight:800;font-size:18px;cursor:pointer
    }
    .primary{background:#fff;color:#111;margin-top:20px}
    .secondary{background:#2a2a31;color:#fff;margin-top:10px}
    .danger{background:#fff;color:#b30000}
    .cancel{background:#26262d;color:#fff}
    .statusbar{
      position:absolute;top:max(12px,env(safe-area-inset-top));left:16px;right:16px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:14px
    }
    .pill{background:#1f1f25;border:1px solid #34343b;border-radius:999px;padding:8px 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .online{display:flex;align-items:center;gap:7px}
    .dot{width:9px;height:9px;border-radius:50%;background:#666}
    .dot.ok{background:var(--green);box-shadow:0 0 12px #21c36a}
    #normalScreen{flex-direction:column}
    .normalContent{text-align:center;width:min(520px,100%)}
    .deviceTitle{font-size:clamp(22px,5vw,32px);font-weight:900;margin-bottom:8px}
    .roomText{color:var(--muted);margin-bottom:30px}
    .reportBtn{
      width:250px;height:250px;max-width:58vw;max-height:58vw;border-radius:50%;border:10px solid #5b0b0b;
      background:radial-gradient(circle at 35% 30%,#ff5a4f 0,#e31818 35%,#9b0505 100%);
      color:#fff;font-weight:1000;font-size:clamp(25px,7vw,38px);
      box-shadow:0 16px 50px #e3181855,inset 0 4px 10px #fff4;
      cursor:pointer
    }
    .hint{color:var(--muted);margin-top:22px;font-size:14px}
    .countWrap{text-align:center;width:min(520px,100%)}
    .countLabel{font-size:clamp(25px,6vw,40px);font-weight:900}
    .countNum{
      font-size:clamp(110px,34vw,210px);line-height:1;font-weight:1000;
      color:#ff3b30;cursor:pointer;margin:20px 0
    }
    .countHint{color:#ffd0cd;margin-bottom:22px;font-weight:700}
    .alarm{
      background:#d90808;
      animation:flash 1s steps(2,end) infinite;
      flex-direction:column;text-align:center
    }
    @keyframes flash{50%{background:#750000}}
    .alarmTitle{font-size:clamp(38px,10vw,80px);font-weight:1000;margin:0 0 20px}
    .alarmIcon{font-size:clamp(75px,20vw,150px);line-height:1}
    .alarmInfo{font-size:clamp(18px,4vw,28px);font-weight:800;line-height:1.7}
    .stopBtn{
      position:absolute;left:18px;right:18px;bottom:max(18px,env(safe-area-inset-bottom));
      width:calc(100% - 36px);border:0;border-radius:18px;padding:17px;background:#fff;color:#b00000;
      font-size:20px;font-weight:1000
    }
    .keypadCard{text-align:center}
    .pinDots{height:42px;font-size:32px;letter-spacing:12px;margin:10px 0 18px}
    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
    .key{
      border:0;border-radius:18px;background:#2b2b32;color:#fff;padding:17px 5px;font-size:27px;font-weight:800
    }
    .key.zero{grid-column:2}
    .key.clear{background:#4b2525}
    .pinError{height:24px;color:#ff7b72;font-weight:800;margin-top:10px}
    .footerNote{
      position:absolute;bottom:max(10px,env(safe-area-inset-bottom));left:12px;right:12px;
      color:#777;text-align:center;font-size:11px
    }
    .noticeOpenBtn{
      position:absolute;right:18px;bottom:max(18px,env(safe-area-inset-bottom));
      width:64px;height:64px;border-radius:50%;border:0;background:#fff;color:#111;
      font-size:30px;font-weight:900;box-shadow:0 10px 30px #0008;z-index:5
    }
    .noticeCard{max-height:90vh;overflow:auto}
    .formRow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .checkRow{
      display:flex;align-items:center;gap:12px;background:#0e0e11;border:1px solid #3a3a43;
      border-radius:14px;padding:14px 16px;margin-top:16px;font-weight:800
    }
    .checkRow input{width:24px;height:24px;margin:0}
    .noticeDisplay{
      flex-direction:column;text-align:center;padding:35px;color:#fff
    }
    .noticeDisplayTitle{
      font-size:clamp(38px,10vw,90px);font-weight:1000;line-height:1.1;
      margin:0 0 25px;max-width:95vw;word-break:break-word
    }
    .noticeDisplayDetail{
      font-size:clamp(21px,5vw,42px);font-weight:750;line-height:1.55;
      white-space:pre-wrap;max-width:1000px;word-break:break-word
    }
    .noticeMeta{
      position:absolute;top:max(15px,env(safe-area-inset-top));left:20px;right:20px;
      display:flex;justify-content:space-between;font-size:14px;font-weight:800;opacity:.85
    }
    .toast{
      position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);
      background:#fff;color:#111;padding:12px 18px;border-radius:999px;font-weight:800;
      opacity:0;pointer-events:none;transition:.2s;z-index:1000;max-width:90%;text-align:center
    }
    .toast.show{opacity:1;transform:translate(-50%,0)}
    @media (orientation:landscape) and (max-height:600px){
      .reportBtn{width:180px}.hint{margin-top:12px}.countNum{font-size:110px;margin:8px 0}
      .alarmIcon{font-size:80px}.alarmTitle{font-size:42px;margin-bottom:5px}.alarmInfo{font-size:18px}
    }
  </style>
</head>
<body>

  <section id="setupScreen" class="screen active">
    <div class="card">
      <h1>連動火災警報パネル</h1>
      <p class="sub">同じ部屋番号を設定した端末どうしで警報を連動します。</p>

      <label for="roomInput">部屋番号</label>
      <input id="roomInput" inputmode="numeric" maxlength="12" placeholder="例：1234" autocomplete="off">

      <label for="deviceInput">このデバイス名</label>
      <input id="deviceInput" maxlength="30" placeholder="例：リビング、2階廊下" autocomplete="off">

      <button id="joinBtn" class="primary">接続して開始</button>
      <button id="soundBtn" class="secondary">音声を有効にする</button>
      <p class="sub" style="font-size:12px;margin:16px 0 0">※これは工作・試作用です。本物の住宅用火災警報器の代わりには使わないでください。</p>
    </div>
  </section>

  <section id="normalScreen" class="screen">
    <div class="statusbar">
      <div id="connectionPill" class="pill online"><span id="connectionDot" class="dot"></span><span id="connectionText">接続中</span></div>
      <button id="settingsBtn" class="pill" style="color:#fff">設定</button>
    </div>
    <div class="normalContent">
      <div id="deviceTitle" class="deviceTitle">デバイス</div>
      <div id="roomText" class="roomText">部屋 ----</div>
      <button id="reportBtn" class="reportBtn">火災を<br>報告</button>
      <div class="hint">押すと10秒後に同じ部屋の全端末へ送信</div>
    </div>
    <button id="noticeOpenBtn" class="noticeOpenBtn" title="お知らせ送信">✉</button>
    <div class="footerNote">工作・試作用。実際の防災設備としては使用しないでください。</div>
  </section>

  <section id="countdownScreen" class="screen">
    <div class="countWrap">
      <div class="countLabel">火災を報告します</div>
      <div id="countNum" class="countNum">10</div>
      <div class="countHint">数字を押すと今すぐ送信</div>
      <button id="cancelBtn" class="cancel">キャンセル</button>
    </div>
  </section>

  <section id="alarmScreen" class="screen alarm">
    <div class="alarmIcon">🔥</div>
    <h2 class="alarmTitle">火災警報</h2>
    <div id="alarmInfo" class="alarmInfo">発報端末：---</div>
    <button id="stopBtn" class="stopBtn">警報停止</button>
  </section>

  <section id="pinScreen" class="screen">
    <div class="card keypadCard">
      <h2>停止パスワード</h2>
      <div id="pinDots" class="pinDots">----</div>
      <div class="keypad">
        <button class="key" data-num="1">1</button>
        <button class="key" data-num="2">2</button>
        <button class="key" data-num="3">3</button>
        <button class="key" data-num="4">4</button>
        <button class="key" data-num="5">5</button>
        <button class="key" data-num="6">6</button>
        <button class="key" data-num="7">7</button>
        <button class="key" data-num="8">8</button>
        <button class="key" data-num="9">9</button>
        <button class="key clear" id="clearPin">消す</button>
        <button class="key zero" data-num="0">0</button>
        <button class="key" id="backToAlarm">戻る</button>
      </div>
      <div id="pinError" class="pinError"></div>
    </div>
  </section>


  <section id="noticeSetupScreen" class="screen">
    <div class="card noticeCard">
      <h2>全画面お知らせ送信</h2>

      <label for="noticeColor">背景色</label>
      <input id="noticeColor" type="color" value="#1268d3">

      <label for="noticeTitleInput">タイトル</label>
      <input id="noticeTitleInput" maxlength="60" placeholder="例：集合してください">

      <label for="noticeDetailInput">詳細</label>
      <textarea id="noticeDetailInput" maxlength="500" placeholder="例：1階のリビングへ集合してください。"></textarea>

      <div class="formRow">
        <div>
          <label for="noticeSeconds">表示時間（秒）</label>
          <input id="noticeSeconds" type="number" inputmode="numeric" min="1" max="600" value="10">
        </div>
        <div>
          <label for="noticeTextColor">文字色</label>
          <select id="noticeTextColor">
            <option value="#ffffff">白</option>
            <option value="#000000">黒</option>
          </select>
        </div>
      </div>

      <label class="checkRow">
        <input id="noticeSpeech" type="checkbox">
        <span>受信した端末で読み上げる</span>
      </label>

      <button id="sendNoticeBtn" class="primary">この部屋へ送信</button>
      <button id="cancelNoticeBtn" class="secondary">戻る</button>
    </div>
  </section>

  <section id="noticeDisplayScreen" class="screen noticeDisplay">
    <div class="noticeMeta">
      <span id="noticeSender">送信元：---</span>
      <span id="noticeRemain">--秒</span>
    </div>
    <h2 id="noticeDisplayTitle" class="noticeDisplayTitle"></h2>
    <div id="noticeDisplayDetail" class="noticeDisplayDetail"></div>
  </section>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    // Raspberry Piの古いChromium向け互換版（ES5中心）
    var firebaseConfig = {
      apiKey: "AIzaSyC9ygh6HjX5mK1e5ZBnEWnLQCEjRMKIEWA",
      authDomain: "sinzo-3f972.firebaseapp.com",
      databaseURL: "https://sinzo-3f972-default-rtdb.firebaseio.com",
      projectId: "sinzo-3f972",
      storageBucket: "sinzo-3f972.firebasestorage.app",
      messagingSenderId: "1058985227031",
      appId: "1:1058985227031:web:6b152911e917903910bd52"
    };

    var db = null;
    var room = "";
    var deviceName = "";
    var alarmRef = null;
    var noticeRef = null;
    var deviceRef = null;
    var heartbeatTimer = null;
    var countdownTimer = null;
    var countdown = 10;
    var pin = "";
    var audioCtx = null;
    var sirenTimer = null;
    var sirenOsc = null;
    var alarmActive = false;
    var noticeTimer = null;
    var noticeCountdownTimer = null;
    var currentNoticeId = "";
    var screens = ["setupScreen","normalScreen","countdownScreen","alarmScreen","pinScreen","noticeSetupScreen","noticeDisplayScreen"];

    function byId(id){ return document.getElementById(id); }

    function makeDeviceId(){
      return "dev-" + new Date().getTime() + "-" + Math.floor(Math.random()*1000000000);
    }

    var deviceId = localStorage.getItem("fireDeviceId");
    if(!deviceId){
      deviceId = makeDeviceId();
      localStorage.setItem("fireDeviceId", deviceId);
    }

    function showScreen(id){
      var i;
      for(i=0;i<screens.length;i++){
        var el = byId(screens[i]);
        if(screens[i] === id){
          if(el.className.indexOf("active") === -1) el.className += " active";
        }else{
          el.className = el.className.replace(/\s*active/g, "");
        }
      }
    }

    function toast(text){
      var el = byId("toast");
      el.innerHTML = text;
      if(el.className.indexOf("show") === -1) el.className += " show";
      clearTimeout(toast.timer);
      toast.timer = setTimeout(function(){
        el.className = el.className.replace(/\s*show/g, "");
      },2200);
    }

    function enableAudio(){
      try{
        var AC = window.AudioContext || window.webkitAudioContext;
        if(!AC){ toast("このブラウザは警報音に対応していません"); return; }
        if(!audioCtx) audioCtx = new AC();
        if(audioCtx.state === "suspended" && audioCtx.resume) audioCtx.resume();
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        gain.gain.value = 0.0001;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(0);
        osc.stop(audioCtx.currentTime + 0.03);
      }catch(e){}
    }

    function playTone(freq){
      if(!alarmActive || !audioCtx) return;
      try{
        sirenOsc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        sirenOsc.type = "square";
        sirenOsc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001,audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.18,audioCtx.currentTime+0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.38);
        sirenOsc.connect(gain);
        gain.connect(audioCtx.destination);
        sirenOsc.start(0);
        sirenOsc.stop(audioCtx.currentTime+0.4);
      }catch(e){}
    }

    function startSiren(){
      stopSiren();
      if(!audioCtx) return;
      var high = false;
      playTone(760);
      sirenTimer = setInterval(function(){
        high = !high;
        playTone(high ? 1150 : 760);
        if(navigator.vibrate) navigator.vibrate([350,150,350]);
      },430);
    }

    function stopSiren(){
      if(sirenTimer) clearInterval(sirenTimer);
      sirenTimer = null;
      try{ if(sirenOsc) sirenOsc.stop(0); }catch(e){}
      sirenOsc = null;
      if(navigator.vibrate) navigator.vibrate(0);
    }

    function sanitizeRoom(value){
      return String(value).replace(/^\s+|\s+$/g,"").replace(/[.#$\[\]\/]/g,"").substring(0,12);
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g,function(c){
        var map={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"};
        return map[c];
      });
    }

    function connectRoom(){
      var newRoom = sanitizeRoom(byId("roomInput").value);
      var newName = String(byId("deviceInput").value).replace(/^\s+|\s+$/g,"").substring(0,30);
      if(!newRoom){ toast("部屋番号を入力して"); return; }
      if(!newName){ toast("デバイス名を入力して"); return; }
      if(!db){ toast("Firebaseに接続できていません"); return; }

      room = newRoom;
      deviceName = newName;
      localStorage.setItem("fireRoom",room);
      localStorage.setItem("fireDeviceName",deviceName);

      if(alarmRef) alarmRef.off();
      if(heartbeatTimer) clearInterval(heartbeatTimer);

      alarmRef = db.ref("fireAlarmRooms/"+room+"/alarm");
      noticeRef = db.ref("fireAlarmRooms/"+room+"/notice");
      deviceRef = db.ref("fireAlarmRooms/"+room+"/devices/"+deviceId);
      deviceRef.set({name:deviceName,online:true,lastSeen:firebase.database.ServerValue.TIMESTAMP});
      deviceRef.onDisconnect().remove();
      heartbeatTimer=setInterval(function(){
        if(deviceRef) deviceRef.update({name:deviceName,online:true,lastSeen:firebase.database.ServerValue.TIMESTAMP});
      },15000);

      alarmRef.on("value",function(snap){
        var data=snap.val();
        if(data && data.active) enterAlarm(data); else exitAlarm();
      });

      noticeRef.on("value",function(snap){
        var data=snap.val();
        if(data && data.active) showNotice(data);
      });

      byId("deviceTitle").innerHTML=escapeHtml(deviceName);
      byId("roomText").innerHTML="部屋 "+escapeHtml(room);
      showScreen("normalScreen");
    }

    function beginCountdown(){
      enableAudio();
      countdown=10;
      byId("countNum").innerHTML=countdown;
      showScreen("countdownScreen");
      if(countdownTimer) clearInterval(countdownTimer);
      countdownTimer=setInterval(function(){
        countdown--;
        byId("countNum").innerHTML=countdown;
        if(countdown<=0){ clearInterval(countdownTimer); countdownTimer=null; sendAlarm(); }
      },1000);
    }

    function cancelCountdown(){
      if(countdownTimer) clearInterval(countdownTimer);
      countdownTimer=null;
      showScreen("normalScreen");
    }

    function sendAlarm(){
      if(countdownTimer) clearInterval(countdownTimer);
      countdownTimer=null;
      if(!alarmRef || !room || !deviceName){ toast("未接続です"); return; }
      alarmRef.set({active:true,senderName:deviceName,senderId:deviceId,startedAt:firebase.database.ServerValue.TIMESTAMP},function(error){
        if(error) toast("送信できなかった");
      });
    }

    function enterAlarm(data){
      closeNotice();
      alarmActive=true;
      if(countdownTimer) clearInterval(countdownTimer);
      countdownTimer=null;
      var own=data.senderId===deviceId;
      byId("alarmInfo").innerHTML="発報端末："+escapeHtml(data.senderName||"不明")+"<br>部屋番号："+escapeHtml(room)+(own?"<br>この端末から発報":"");
      showScreen("alarmScreen");
      startSiren();
    }

    function exitAlarm(){
      if(!alarmActive) return;
      alarmActive=false;
      stopSiren();
      pin="";
      updatePin();
      showScreen("normalScreen");
    }


    function playChime(){
      enableAudio();
      if(!audioCtx) return;
      try{
        var now=audioCtx.currentTime;
        var notes=[659.25,783.99,1046.5];
        var i;
        for(i=0;i<notes.length;i++){
          var osc=audioCtx.createOscillator();
          var gain=audioCtx.createGain();
          osc.type="sine";
          osc.frequency.value=notes[i];
          gain.gain.setValueAtTime(0.0001,now+i*0.16);
          gain.gain.exponentialRampToValueAtTime(0.16,now+i*0.16+0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001,now+i*0.16+0.55);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now+i*0.16);
          osc.stop(now+i*0.16+0.58);
        }
      }catch(e){}
    }

    function speakNotice(title,detail){
      try{
        if(!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        var utter=new SpeechSynthesisUtterance((title||"")+"。"+(detail||""));
        utter.lang="ja-JP";
        utter.rate=0.95;
        utter.pitch=1;
        window.speechSynthesis.speak(utter);
      }catch(e){}
    }

    function sendNotice(){
      if(!noticeRef){ toast("部屋に接続していません"); return; }
      var title=String(byId("noticeTitleInput").value).replace(/^\s+|\s+$/g,"");
      var detail=String(byId("noticeDetailInput").value).replace(/^\s+|\s+$/g,"");
      var seconds=parseInt(byId("noticeSeconds").value,10);
      if(!title){ toast("タイトルを入力して"); return; }
      if(isNaN(seconds)||seconds<1) seconds=1;
      if(seconds>600) seconds=600;

      enableAudio();
      noticeRef.set({
        active:true,
        id:"notice-"+new Date().getTime()+"-"+Math.floor(Math.random()*100000),
        title:title,
        detail:detail,
        background:byId("noticeColor").value||"#1268d3",
        textColor:byId("noticeTextColor").value||"#ffffff",
        seconds:seconds,
        speech:byId("noticeSpeech").checked===true,
        senderName:deviceName,
        senderId:deviceId,
        sentAt:firebase.database.ServerValue.TIMESTAMP
      },function(error){
        if(error) toast("送信できなかった");
        else showScreen("normalScreen");
      });
    }

    function showNotice(data){
      if(alarmActive) return;
      var id=String(data.id||data.sentAt||"");
      if(id && currentNoticeId===id) return;
      currentNoticeId=id;

      if(noticeTimer) clearTimeout(noticeTimer);
      if(noticeCountdownTimer) clearInterval(noticeCountdownTimer);
      if(window.speechSynthesis) try{window.speechSynthesis.cancel();}catch(e){}

      var seconds=parseInt(data.seconds,10);
      if(isNaN(seconds)||seconds<1) seconds=10;
      if(seconds>600) seconds=600;

      var screen=byId("noticeDisplayScreen");
      screen.style.backgroundColor=data.background||"#1268d3";
      screen.style.color=data.textColor||"#ffffff";
      byId("noticeDisplayTitle").innerHTML=escapeHtml(data.title||"お知らせ");
      byId("noticeDisplayDetail").innerHTML=escapeHtml(data.detail||"");
      byId("noticeSender").innerHTML="送信元："+escapeHtml(data.senderName||"不明");
      byId("noticeRemain").innerHTML=seconds+"秒";

      showScreen("noticeDisplayScreen");
      playChime();
      if(data.speech){
        setTimeout(function(){speakNotice(data.title,data.detail);},700);
      }

      var remain=seconds;
      noticeCountdownTimer=setInterval(function(){
        remain--;
        if(remain<0) remain=0;
        byId("noticeRemain").innerHTML=remain+"秒";
      },1000);

      noticeTimer=setTimeout(function(){
        closeNotice();
      },seconds*1000);
    }

    function closeNotice(){
      if(noticeTimer) clearTimeout(noticeTimer);
      if(noticeCountdownTimer) clearInterval(noticeCountdownTimer);
      noticeTimer=null;
      noticeCountdownTimer=null;
      if(window.speechSynthesis) try{window.speechSynthesis.cancel();}catch(e){}
      if(!alarmActive) showScreen("normalScreen");
    }

    function repeatText(text,count){
      var out="",i; for(i=0;i<count;i++) out+=text; return out;
    }

    function updatePin(){
      byId("pinDots").innerHTML=repeatText("●",pin.length)+repeatText("—",4-pin.length);
    }

    function inputPin(n){
      if(pin.length>=4) return;
      pin+=n;
      updatePin();
      byId("pinError").innerHTML="";
      if(pin.length===4){
        if(pin==="2059"){
          alarmRef.set({active:false,stoppedBy:deviceName,stoppedAt:firebase.database.ServerValue.TIMESTAMP});
          pin=""; updatePin();
        }else{
          byId("pinError").innerHTML="パスワードが違います";
          if(navigator.vibrate) navigator.vibrate([100,80,100]);
          setTimeout(function(){pin="";updatePin();},650);
        }
      }
    }

    function bindPress(id,fn){
      var el=byId(id);
      if(!el) return;
      el.onclick=function(e){ if(e && e.preventDefault) e.preventDefault(); fn(); return false; };
      el.ontouchend=function(e){ if(e && e.preventDefault) e.preventDefault(); fn(); return false; };
    }

    function init(){
      byId("roomInput").value=localStorage.getItem("fireRoom")||"";
      byId("deviceInput").value=localStorage.getItem("fireDeviceName")||"";

      try{
        firebase.initializeApp(firebaseConfig);
        db=firebase.database();
      }catch(e){ toast("Firebaseの読み込みに失敗しました"); }

      bindPress("soundBtn",function(){enableAudio();toast("警報音を有効にした");});
      bindPress("joinBtn",function(){enableAudio();connectRoom();});
      bindPress("reportBtn",beginCountdown);
      bindPress("countNum",sendAlarm);
      bindPress("cancelBtn",cancelCountdown);
      bindPress("stopBtn",function(){pin="";updatePin();byId("pinError").innerHTML="";showScreen("pinScreen");});
      bindPress("backToAlarm",function(){showScreen("alarmScreen");});
      bindPress("clearPin",function(){pin="";updatePin();});
      bindPress("noticeOpenBtn",function(){enableAudio();showScreen("noticeSetupScreen");});
      bindPress("cancelNoticeBtn",function(){showScreen("normalScreen");});
      bindPress("sendNoticeBtn",sendNotice);
      bindPress("settingsBtn",function(){
        if(deviceRef) deviceRef.remove();
        if(alarmRef) alarmRef.off();
        if(noticeRef) noticeRef.off();
        if(heartbeatTimer) clearInterval(heartbeatTimer);
        room="";deviceName="";showScreen("setupScreen");
      });

      var keys=document.querySelectorAll("[data-num]");
      var i;
      for(i=0;i<keys.length;i++){
        (function(btn){
          btn.onclick=function(e){if(e&&e.preventDefault)e.preventDefault();inputPin(btn.getAttribute("data-num"));return false;};
          btn.ontouchend=function(e){if(e&&e.preventDefault)e.preventDefault();inputPin(btn.getAttribute("data-num"));return false;};
        })(keys[i]);
      }

      if(db){
        db.ref(".info/connected").on("value",function(snap){
          var ok=snap.val()===true;
          var dot=byId("connectionDot");
          dot.className=ok?"dot ok":"dot";
          byId("connectionText").innerHTML=ok?"オンライン":"オフライン";
        });
      }

      document.addEventListener("visibilitychange",function(){if(!document.hidden&&alarmActive)startSiren();},false);
    }

    if(document.readyState === "loading") document.addEventListener("DOMContentLoaded",init,false); else init();
  </script>
</body>
</html>
