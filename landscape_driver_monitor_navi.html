<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Safety Map Navi</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #08111f;
      color: white;
    }

    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .topbar {
      position: fixed;
      z-index: 500;
      top: max(12px, env(safe-area-inset-top));
      left: max(14px, env(safe-area-inset-left));
      right: max(14px, env(safe-area-inset-right));
      height: 68px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 22px;
      background: rgba(8, 18, 33, .84);
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 35px rgba(0,0,0,.25);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: clamp(16px, 2vw, 24px);
      white-space: nowrap;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, #2580ff, #62a5ff);
      box-shadow: 0 8px 18px rgba(37,128,255,.35);
    }

    .clock {
      text-align: center;
      min-width: 140px;
    }

    .clock strong {
      display: block;
      font-size: clamp(24px, 3.5vw, 40px);
      line-height: 1;
    }

    .clock span {
      color: #a9b8ce;
      font-size: 11px;
    }

    .weather {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 9px;
      text-align: right;
    }

    .weather-icon {
      font-size: 30px;
    }

    .weather strong {
      display: block;
      font-size: 18px;
    }

    .weather small {
      color: #a9b8ce;
    }

    .camera-card {
      position: fixed;
      z-index: 500;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      width: min(270px, 30vw);
      min-width: 190px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 22px;
      background: rgba(8,18,33,.88);
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 35px rgba(0,0,0,.28);
    }

    .camera-view {
      position: relative;
      overflow: hidden;
      aspect-ratio: 16 / 10;
      border-radius: 15px;
      background: #04080f;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .face-frame {
      position: absolute;
      inset: 15% 27%;
      border: 2px dashed rgba(255,255,255,.52);
      border-radius: 45%;
      pointer-events: none;
    }

    .cam-status {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(5,12,22,.82);
      font-size: 11px;
      font-weight: 800;
    }

    .camera-info {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }

    .info-box {
      padding: 7px 5px;
      text-align: center;
      border-radius: 11px;
      background: rgba(255,255,255,.06);
    }

    .info-box small {
      display: block;
      color: #9fb0c7;
      font-size: 9px;
    }

    .info-box b {
      display: block;
      margin-top: 3px;
      font-size: 12px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      color: white;
      background: #2677ed;
      font-weight: 850;
      cursor: pointer;
    }

    button.secondary { background: #30415c; }
    button.stop { background: #b9263b; }

    .speed-card {
      position: fixed;
      z-index: 500;
      left: max(14px, env(safe-area-inset-left));
      bottom: max(14px, env(safe-area-inset-bottom));
      min-width: 145px;
      padding: 15px 20px;
      text-align: center;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 22px;
      background: rgba(8,18,33,.88);
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 35px rgba(0,0,0,.28);
    }

    .speed-card strong {
      display: block;
      font-size: clamp(42px, 6vw, 72px);
      line-height: .95;
    }

    .speed-card span {
      color: #a9b8ce;
      font-weight: 800;
    }

    .location-button {
      position: fixed;
      z-index: 500;
      left: max(14px, env(safe-area-inset-left));
      top: 94px;
      width: 48px;
      height: 48px;
      border-radius: 15px;
      font-size: 21px;
      box-shadow: 0 10px 26px rgba(0,0,0,.24);
    }

    .warning-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: none;
      place-items: center;
      padding: 30px;
      text-align: center;
      background: rgba(188, 0, 24, .93);
      animation: warningFlash .55s infinite alternate;
    }

    .warning-screen.show {
      display: grid;
    }

    .warning-screen .icon {
      font-size: clamp(70px, 14vw, 150px);
      line-height: 1;
    }

    .warning-screen h1 {
      margin: 15px 0 8px;
      font-size: clamp(40px, 8vw, 90px);
    }

    .warning-screen p {
      margin: 0;
      font-size: clamp(17px, 3vw, 30px);
      font-weight: 800;
    }

    @keyframes warningFlash {
      from { opacity: .78; }
      to { opacity: 1; }
    }

    .stop-prompt {
      position: fixed;
      inset: 0;
      z-index: 1900;
      display: none;
      place-items: center;
      padding: 30px;
      background:
        radial-gradient(circle at center, rgba(255,190,46,.24), transparent 45%),
        rgba(5, 12, 22, .92);
      backdrop-filter: blur(14px);
    }

    .stop-prompt.show {
      display: grid;
    }

    .prompt-card {
      width: min(760px, 92vw);
      padding: 34px;
      text-align: center;
      border: 2px solid rgba(255,208,99,.55);
      border-radius: 30px;
      background: rgba(19,29,44,.96);
      box-shadow: 0 25px 70px rgba(0,0,0,.4);
    }

    .prompt-card .road-animation {
      position: relative;
      height: 120px;
      margin-bottom: 20px;
      overflow: hidden;
      border-radius: 20px;
      background: #323a45;
      border-left: 24px solid #69737d;
      border-right: 24px solid #69737d;
    }

    .prompt-card .road-animation::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 6px;
      transform: translateX(-50%);
      background: repeating-linear-gradient(
        to bottom,
        #f4f0cb 0 25px,
        transparent 25px 48px
      );
    }

    .mini-car {
      position: absolute;
      left: 42%;
      top: 42px;
      width: 74px;
      height: 38px;
      transition: left 2.8s ease, top 2.8s ease;
    }

    .mini-car.move {
      left: 76%;
      top: 60px;
    }

    .mini-car-body {
      position: absolute;
      inset: 5px 0;
      border-radius: 14px;
      background: linear-gradient(145deg, #ffffff, #9fb0c2);
      box-shadow: 0 7px 15px rgba(0,0,0,.35);
    }

    .mini-car-body::before {
      content: "";
      position: absolute;
      left: 18px;
      top: -8px;
      width: 38px;
      height: 16px;
      border-radius: 8px 8px 3px 3px;
      background: #8cd2ff;
      border: 3px solid #c7d2dc;
    }

    .prompt-card h2 {
      margin: 0 0 8px;
      color: #ffd665;
      font-size: clamp(28px, 5vw, 54px);
    }

    .prompt-card p {
      margin: 0;
      color: #e6edf7;
      font-size: clamp(15px, 2.4vw, 24px);
      line-height: 1.65;
      font-weight: 750;
    }

    .prompt-card .small-note {
      display: block;
      margin-top: 12px;
      color: #9dafc7;
      font-size: 12px;
      font-weight: 500;
    }

    .rotate-message {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 3000;
      place-items: center;
      text-align: center;
      padding: 30px;
      background: #08111f;
    }

    .rotate-message strong {
      display: block;
      font-size: 70px;
      margin-bottom: 12px;
    }

    @media (orientation: portrait) {
      .rotate-message { display: grid; }
    }

    @media (max-height: 520px) {
      .topbar {
        height: 58px;
      }

      .camera-card {
        width: 220px;
      }

      .camera-info {
        display: none;
      }

      .location-button {
        top: 82px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <span>Safety Map</span>
    </div>

    <div class="clock">
      <strong id="time">--:--</strong>
      <span id="date">----/--/--</span>
    </div>

    <div class="weather">
      <div id="weatherIcon" class="weather-icon">🌤️</div>
      <div>
        <strong id="temperature">--℃</strong>
        <small id="weatherText">取得中</small>
      </div>
    </div>
  </header>

  <button id="locationButton" class="location-button" title="現在地へ">⌖</button>

  <section class="speed-card">
    <strong id="speed">0</strong>
    <span>km/h</span>
  </section>

  <section class="camera-card">
    <div class="camera-view">
      <video id="video" autoplay muted playsinline></video>
      <div class="face-frame"></div>
      <div id="cameraStatus" class="cam-status">停止中</div>
    </div>

    <div class="camera-info">
      <div class="info-box">
        <small>顔</small>
        <b id="faceState">未確認</b>
      </div>
      <div class="info-box">
        <small>目</small>
        <b id="eyeState">未確認</b>
      </div>
      <div class="info-box">
        <small>閉眼</small>
        <b id="closedTime">0.0秒</b>
      </div>
    </div>

    <div class="buttons">
      <button id="cameraButton">カメラ開始</button>
      <button id="demoButton" class="secondary">居眠りデモ</button>
    </div>
  </section>

  <section id="warningScreen" class="warning-screen">
    <div>
      <div class="icon">⚠️</div>
      <h1>起きてください</h1>
      <p>前方を確認してください</p>
    </div>
  </section>

  <section id="stopPrompt" class="stop-prompt">
    <div class="prompt-card">
      <div class="road-animation">
        <div id="miniCar" class="mini-car">
          <div class="mini-car-body"></div>
        </div>
      </div>

      <h2>安全な場所へ停車してください</h2>
      <p>
        周囲を確認し、ウインカーを出して、<br>
        無理のない範囲で安全な場所へ移動してください。
      </p>
      <span class="small-note">
        この画面は停車を促すだけで、車を自動操作するものではありません。
      </span>
    </div>
  </section>

  <section class="rotate-message">
    <div>
      <strong>↻</strong>
      <h2>横向きにしてね</h2>
      <p>この画面は横向き専用です。</p>
    </div>
  </section>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin="">
  </script>

  <script type="module">
    import {
      FaceLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304";

    const DEFAULT_POSITION = [35.681236, 139.767125];

    const map = L.map("map", {
      zoomControl: false,
      attributionControl: true
    }).setView(DEFAULT_POSITION, 16);

    L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }
    ).addTo(map);

    L.control.zoom({ position: "bottomleft" }).addTo(map);

    let currentMarker = null;
    let accuracyCircle = null;
    let latestPosition = null;
    let lastGpsSample = null;

    const locationIcon = L.divIcon({
      className: "",
      html: `
        <div style="
          width:24px;height:24px;border-radius:50%;
          background:#277cff;border:4px solid white;
          box-shadow:0 0 0 8px rgba(39,124,255,.22),0 5px 14px rgba(0,0,0,.35);
        "></div>
      `,
      iconSize: [24,24],
      iconAnchor: [12,12]
    });

    function updateMapPosition(position, centerMap = false) {
      const { latitude, longitude, accuracy, speed } = position.coords;
      const latlng = [latitude, longitude];
      latestPosition = latlng;

      if (!currentMarker) {
        currentMarker = L.marker(latlng, { icon: locationIcon }).addTo(map);
        accuracyCircle = L.circle(latlng, {
          radius: accuracy || 20,
          weight: 1,
          fillOpacity: .08
        }).addTo(map);
        map.setView(latlng, 17);
      } else {
        currentMarker.setLatLng(latlng);
        accuracyCircle.setLatLng(latlng);
        accuracyCircle.setRadius(accuracy || 20);
        if (centerMap) map.panTo(latlng);
      }

      let kmh = 0;

      if (typeof speed === "number" && speed >= 0) {
        kmh = speed * 3.6;
      } else if (lastGpsSample) {
        const elapsed = (position.timestamp - lastGpsSample.timestamp) / 1000;
        if (elapsed > 0) {
          const distance = map.distance(
            [lastGpsSample.latitude, lastGpsSample.longitude],
            latlng
          );
          kmh = (distance / elapsed) * 3.6;
          if (kmh > 180) kmh = 0;
        }
      }

      document.getElementById("speed").textContent = Math.round(kmh);

      lastGpsSample = {
        latitude,
        longitude,
        timestamp: position.timestamp
      };
    }

    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(
        position => updateMapPosition(position),
        error => console.warn("位置情報:", error.message),
        {
          enableHighAccuracy: true,
          maximumAge: 1000,
          timeout: 10000
        }
      );

      navigator.geolocation.getCurrentPosition(
        position => {
          updateMapPosition(position, true);
          loadWeather(position.coords.latitude, position.coords.longitude);
        },
        () => loadWeather(...DEFAULT_POSITION),
        { enableHighAccuracy: true, timeout: 7000 }
      );
    } else {
      loadWeather(...DEFAULT_POSITION);
    }

    document.getElementById("locationButton").addEventListener("click", () => {
      if (latestPosition) map.setView(latestPosition, 17);
    });

    function updateClock() {
      const now = new Date();

      document.getElementById("time").textContent =
        now.toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit"
        });

      document.getElementById("date").textContent =
        now.toLocaleDateString("ja-JP", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          weekday: "short"
        });
    }

    updateClock();
    setInterval(updateClock, 1000);

    const weatherMap = {
      0: ["☀️", "快晴"],
      1: ["🌤️", "晴れ"],
      2: ["⛅", "晴れ時々くもり"],
      3: ["☁️", "くもり"],
      45: ["🌫️", "霧"],
      48: ["🌫️", "霧"],
      51: ["🌦️", "小雨"],
      53: ["🌦️", "小雨"],
      55: ["🌧️", "雨"],
      61: ["🌧️", "雨"],
      63: ["🌧️", "雨"],
      65: ["🌧️", "強い雨"],
      71: ["🌨️", "雪"],
      73: ["🌨️", "雪"],
      75: ["❄️", "大雪"],
      80: ["🌦️", "にわか雨"],
      81: ["🌧️", "にわか雨"],
      82: ["⛈️", "激しい雨"],
      95: ["⛈️", "雷雨"]
    };

    async function loadWeather(lat, lon) {
      try {
        const url =
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}` +
          `&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`;

        const response = await fetch(url);
        const data = await response.json();
        const code = data.current.weather_code;
        const [icon, text] = weatherMap[code] || ["🌤️", "天気"];

        document.getElementById("weatherIcon").textContent = icon;
        document.getElementById("temperature").textContent =
          `${Math.round(data.current.temperature_2m)}℃`;
        document.getElementById("weatherText").textContent = text;
      } catch {
        document.getElementById("weatherText").textContent = "取得失敗";
      }
    }

    const video = document.getElementById("video");
    const cameraButton = document.getElementById("cameraButton");
    const demoButton = document.getElementById("demoButton");
    const cameraStatus = document.getElementById("cameraStatus");
    const faceState = document.getElementById("faceState");
    const eyeState = document.getElementById("eyeState");
    const closedTime = document.getElementById("closedTime");
    const warningScreen = document.getElementById("warningScreen");
    const stopPrompt = document.getElementById("stopPrompt");
    const miniCar = document.getElementById("miniCar");

    let faceLandmarker = null;
    let cameraStream = null;
    let cameraRunning = false;
    let lastVideoTime = -1;
    let closedSince = null;
    let sequenceRunning = false;
    let audioContext = null;
    let alarmInterval = null;

    async function loadFaceModel() {
      if (faceLandmarker) return;

      cameraStatus.textContent = "AI読込中";

      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/wasm"
      );

      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/" +
            "face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numFaces: 1,
        outputFaceBlendshapes: true
      });
    }

    async function startCamera() {
      try {
        cameraButton.disabled = true;
        await loadFaceModel();

        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = cameraStream;
        await video.play();

        cameraRunning = true;
        closedSince = null;
        lastVideoTime = -1;

        cameraStatus.textContent = "監視中";
        cameraStatus.style.background = "rgba(17,132,72,.9)";
        cameraButton.textContent = "カメラ停止";
        cameraButton.classList.add("stop");
        cameraButton.disabled = false;

        detectLoop();
      } catch (error) {
        console.error(error);
        cameraButton.disabled = false;
        cameraStatus.textContent = "開始失敗";

        alert(
          "カメラを開始できませんでした。\n" +
          "HTTPSで開いて、カメラの使用を許可してください。"
        );
      }
    }

    function stopCamera() {
      cameraRunning = false;

      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
      }

      cameraStream = null;
      video.srcObject = null;
      cameraStatus.textContent = "停止中";
      cameraStatus.style.background = "rgba(5,12,22,.82)";
      cameraButton.textContent = "カメラ開始";
      cameraButton.classList.remove("stop");
      faceState.textContent = "未確認";
      eyeState.textContent = "未確認";
      closedTime.textContent = "0.0秒";
      closedSince = null;
    }

    cameraButton.addEventListener("click", () => {
      if (cameraRunning) stopCamera();
      else startCamera();
    });

    function getBlendshape(categories, name) {
      return categories.find(item => item.categoryName === name)?.score ?? 0;
    }

    function detectLoop() {
      if (!cameraRunning) return;

      if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        const now = performance.now();
        const result = faceLandmarker.detectForVideo(video, now);
        const categories = result.faceBlendshapes?.[0]?.categories;

        if (!categories) {
          faceState.textContent = "なし";
          eyeState.textContent = "判定不能";
          closedTime.textContent = "0.0秒";
          closedSince = null;
        } else {
          faceState.textContent = "検出中";

          const blinkScore =
            (
              getBlendshape(categories, "eyeBlinkLeft") +
              getBlendshape(categories, "eyeBlinkRight")
            ) / 2;

          const eyesClosed = blinkScore >= 0.56;

          if (eyesClosed) {
            eyeState.textContent = "閉じている";
            eyeState.style.color = "#ff8c9a";

            if (closedSince === null) closedSince = now;

            const seconds = (now - closedSince) / 1000;
            closedTime.textContent = `${seconds.toFixed(1)}秒`;

            if (seconds >= 1.5) startSafetySequence();
          } else {
            eyeState.textContent = "開いている";
            eyeState.style.color = "#8effbf";
            closedTime.textContent = "0.0秒";
            closedSince = null;
          }
        }
      }

      requestAnimationFrame(detectLoop);
    }

    function beep() {
      if (!audioContext) {
        audioContext =
          new (window.AudioContext || window.webkitAudioContext)();
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "square";
      oscillator.frequency.value = 980;

      gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(
        0.34,
        audioContext.currentTime + 0.02
      );
      gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioContext.currentTime + 0.28
      );

      oscillator.connect(gain);
      gain.connect(audioContext.destination);

      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.3);

      if (navigator.vibrate) {
        navigator.vibrate([280, 110, 280]);
      }
    }

    function startSafetySequence() {
      if (sequenceRunning) return;

      sequenceRunning = true;
      warningScreen.classList.add("show");

      beep();
      alarmInterval = setInterval(beep, 650);

      setTimeout(() => {
        clearInterval(alarmInterval);
        warningScreen.classList.remove("show");
        stopPrompt.classList.add("show");

        requestAnimationFrame(() => {
          miniCar.classList.add("move");
        });
      }, 3000);

      setTimeout(() => {
        stopPrompt.classList.remove("show");
        miniCar.classList.remove("move");
        sequenceRunning = false;
        closedSince = null;
      }, 10000);
    }

    demoButton.addEventListener("click", startSafetySequence);

    window.addEventListener("pagehide", () => {
      stopCamera();
      clearInterval(alarmInterval);
    });
  </script>
</body>
</html>
