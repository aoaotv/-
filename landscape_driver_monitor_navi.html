<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ドライバー見守りナビ</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif;background:#07111f;color:#fff}.portrait{display:none;place-items:center;height:100vh;font-size:24px;font-weight:900;text-align:center;padding:30px}.app{height:100dvh;padding:10px;display:grid;grid-template-rows:78px 1fr 58px;gap:10px;background:radial-gradient(circle at 80% 0,#17396c 0,transparent 34%),linear-gradient(#07111f,#091625)}.top{display:grid;grid-template-columns:1.1fr .9fr .9fr 1fr;gap:10px}.tile,.status,.controls>*{background:rgba(9,23,41,.92);border:1px solid #29405f;border-radius:16px}.tile{padding:11px 14px;min-width:0}.tile small,.status small{display:block;color:#9db0c7;font-size:11px}.big{font-size:clamp(22px,3.6vw,34px);font-weight:950;line-height:1.05;white-space:nowrap}.sub{margin-top:5px;color:#9db0c7;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.main{min-height:0;display:grid;grid-template-columns:1.65fr .85fr;gap:10px}.nav{position:relative;overflow:hidden;border:1px solid #29405f;border-radius:22px;background:linear-gradient(#7bbbf3 0 35%,#609b50 35%);box-shadow:0 16px 38px #0005}.road{position:absolute;left:17%;right:17%;top:22%;bottom:-10%;clip-path:polygon(38% 0,62% 0,100% 100%,0 100%);background:#343b46;box-shadow:inset 0 0 0 4px #4b535f}.shoulder{position:absolute;right:10%;top:22%;bottom:-10%;width:17%;clip-path:polygon(18% 0,56% 0,100% 100%,0 100%);background:#8b8f94}.lane{position:absolute;left:49%;top:22%;bottom:-5%;width:1.5%;background:repeating-linear-gradient(to bottom,#fff 0 22px,transparent 22px 45px)}.route{position:absolute;left:45%;top:34%;width:10%;height:54%;background:linear-gradient(transparent,#2d7cff 20%);clip-path:polygon(42% 0,58% 0,92% 100%,8% 100%);filter:drop-shadow(0 0 12px #2d7cffee)}.car{position:absolute;left:50%;bottom:8%;width:58px;height:96px;transform:translateX(-50%);transition:left 2.8s ease,transform 2.8s ease;z-index:5}.car.pull{left:78%;transform:translateX(-50%) rotate(4deg)}.body{position:absolute;inset:0;border-radius:22px 22px 16px 16px;background:linear-gradient(#f5f8ff,#aab5c5);box-shadow:0 8px 18px #0008}.window{position:absolute;left:10px;right:10px;top:13px;height:29px;border-radius:10px;background:#20476b}.wheel{position:absolute;width:8px;height:22px;bottom:13px;border-radius:5px;background:#111}.wl{left:-4px}.wr{right:-4px}.navcard,.msg{position:absolute;z-index:7;background:#07111fd9;backdrop-filter:blur(10px);border-radius:15px}.navcard{left:14px;top:14px;max-width:58%;padding:11px 13px}.navcard strong{display:block;font-size:clamp(17px,2.8vw,25px)}.navcard span{font-size:12px;color:#cbd8e8}.msg{left:14px;right:14px;bottom:14px;padding:11px 14px;font-weight:850}.side{min-height:0;display:grid;grid-template-rows:1fr auto;gap:10px}.camera{position:relative;overflow:hidden;border:1px solid #29405f;border-radius:22px;background:#111b2a}.camera video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}.camera:after{content:"";position:absolute;inset:12%;border:2px dashed #ffffff59;border-radius:46%;pointer-events:none}.badge{position:absolute;z-index:3;left:10px;top:10px;padding:8px 10px;border-radius:999px;background:#07111fcc;font-size:12px;font-weight:900}.alarm{position:absolute;z-index:5;inset:0;display:none;place-items:center;text-align:center;background:#d2001cdd;animation:flash .45s infinite alternate}.alarm.show{display:grid}.alarm strong{font-size:clamp(28px,5vw,52px)}.alarm span{display:block;font-weight:950}@keyframes flash{from{opacity:.7}to{opacity:1}}.statuses{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.status{text-align:center;padding:9px}.status b{display:block;margin-top:3px;font-size:14px}.controls{display:grid;grid-template-columns:1.2fr 1fr 1fr 1.1fr;gap:10px}.controls button,.speedbox{border:1px solid #29405f;border-radius:15px;color:#fff;font-weight:900}.controls button{font-size:15px;cursor:pointer}.primary{background:#1d68e8!important}.danger{background:#a91d31!important}.speedbox{display:flex;align-items:center;gap:8px;padding:0 12px}.speedbox label{font-size:12px;color:#9db0c7;white-space:nowrap}.speedbox input{width:100%}@media(orientation:portrait){.app{display:none}.portrait{display:grid}}
</style>
</head>
<body>
<div class="portrait">📱 スマホを横向きにして使ってね</div>
<main class="app">
<header class="top">
<section class="tile"><small>現在時刻</small><div id="clock" class="big">--:--</div><div id="date" class="sub">----</div></section>
<section class="tile"><small>天気</small><div class="big"><span id="wi">☀️</span> <span id="temp">--°</span></div><div id="wt" class="sub">位置情報を待っています</div></section>
<section class="tile"><small>現在の時速</small><div class="big"><span id="speed">0</span> <span style="font-size:.45em">km/h</span></div><div class="sub">GPSまたは手動設定</div></section>
<section class="tile"><small>運転状態</small><div id="state" class="big" style="font-size:clamp(19px,3vw,28px)">待機中</div><div id="statesub" class="sub">カメラを開始してください</div></section>
</header>
<section class="main">
<section class="nav"><div class="shoulder"></div><div class="road"></div><div class="lane"></div><div class="route"></div><div class="navcard"><strong>300m先を右方向</strong><span>安全運転で進んでください</span></div><div id="car" class="car"><div class="body"></div><div class="window"></div><div class="wheel wl"></div><div class="wheel wr"></div></div><div id="msg" class="msg">ルート案内中</div></section>
<aside class="side"><section class="camera"><video id="video" autoplay playsinline muted></video><div id="badge" class="badge">カメラ停止中</div><div id="alarm" class="alarm"><div><strong>⚠️ 警報</strong><span>目を開けてください</span></div></div></section><section class="statuses"><div class="status"><small>顔</small><b id="face">未確認</b></div><div class="status"><small>目</small><b id="eye">未確認</b></div><div class="status"><small>閉眼時間</small><b id="closed">0.0秒</b></div></section></aside>
</section>
<footer class="controls"><button id="cam" class="primary">カメラ開始</button><button id="test">警報テスト</button><button id="pull">路肩アニメーション</button><div class="speedbox"><label>手動速度</label><input id="slider" type="range" min="0" max="120" value="0"></div></footer>
</main>
<script type="module">
import{FaceLandmarker,FilesetResolver}from"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304";
const $=id=>document.getElementById(id),video=$("video"),cam=$("cam"),alarm=$("alarm"),car=$("car"),msg=$("msg"),badge=$("badge"),face=$("face"),eye=$("eye"),closed=$("closed"),state=$("state"),statesub=$("statesub"),speed=$("speed"),slider=$("slider");
let model,stream,running=false,closedSince=null,alarmOn=false,timer,audio,lastTime=-1,pulling=false;
function clock(){const n=new Date();$("clock").textContent=n.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});$("date").textContent=n.toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})}clock();setInterval(clock,1000);slider.oninput=()=>speed.textContent=slider.value;
if(navigator.geolocation)navigator.geolocation.watchPosition(p=>{if(p.coords.speed!=null){const k=Math.max(0,p.coords.speed*3.6);speed.textContent=Math.round(k);slider.value=Math.min(120,Math.round(k))}},()=>{},{enableHighAccuracy:true,maximumAge:2000});
function weather(c){if(c===0)return["☀️","晴れ"];if([1,2,3].includes(c))return["⛅","くもり"];if([45,48].includes(c))return["🌫️","霧"];if([51,53,55,61,63,65,80,81,82].includes(c))return["🌧️","雨"];if([71,73,75,77,85,86].includes(c))return["❄️","雪"];if([95,96,99].includes(c))return["⛈️","雷雨"];return["🌤️","天気情報"]}
function loadWeather(){if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(async p=>{try{const u=`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current=temperature_2m,weather_code`,d=await(await fetch(u)).json(),w=weather(d.current.weather_code);$("temp").textContent=Math.round(d.current.temperature_2m)+"°";$("wi").textContent=w[0];$("wt").textContent=w[1]}catch{$("wt").textContent="天気取得失敗"}},()=>$("wt").textContent="位置情報を許可してください")}
loadWeather();setInterval(loadWeather,600000);
async function loadModel(){if(model)return;badge.textContent="AI読込中";const v=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/wasm");model=await FaceLandmarker.createFromOptions(v,{baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",delegate:"GPU"},runningMode:"VIDEO",numFaces:1,outputFaceBlendshapes:true})}
async function start(){try{cam.disabled=true;await loadModel();stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;await video.play();running=true;cam.disabled=false;cam.textContent="カメラ停止";cam.classList.add("danger");badge.textContent="監視中";state.textContent="監視中";statesub.textContent="目の状態を確認しています";loop()}catch{cam.disabled=false;badge.textContent="開始失敗";alert("HTTPSで開き、カメラを許可してください。")}}
function stop(){running=false;stopAlarm();if(stream)stream.getTracks().forEach(t=>t.stop());stream=null;video.srcObject=null;cam.textContent="カメラ開始";cam.classList.remove("danger");badge.textContent="カメラ停止中";face.textContent=eye.textContent="未確認";closed.textContent="0.0秒";state.textContent="待機中";statesub.textContent="カメラを開始してください"}
cam.onclick=()=>running?stop():start();
const score=(a,n)=>a.find(x=>x.categoryName===n)?.score??0;
function loop(){if(!running)return;if(video.readyState>=2&&video.currentTime!==lastTime){lastTime=video.currentTime;const now=performance.now(),r=model.detectForVideo(video,now),s=r.faceBlendshapes?.[0]?.categories;if(!s){face.textContent="なし";eye.textContent="判定不能";closedSince=null;closed.textContent="0.0秒"}else{face.textContent="検出";const shut=(score(s,"eyeBlinkLeft")+score(s,"eyeBlinkRight"))/2>=.55;if(shut){eye.textContent="閉じている";eye.style.color="#ff8da0";if(closedSince===null)closedSince=now;const sec=(now-closedSince)/1000;closed.textContent=sec.toFixed(1)+"秒";if(sec>=1.5){startAlarm();pullOver()}}else{eye.textContent="開いている";eye.style.color="#72f0ae";closedSince=null;closed.textContent="0.0秒";if(alarmOn)stopAlarm()}}}requestAnimationFrame(loop)}
function beep(){audio??=new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.type="square";o.frequency.value=950;g.gain.setValueAtTime(.001,audio.currentTime);g.gain.exponentialRampToValueAtTime(.35,audio.currentTime+.02);g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+.28);o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+.3);navigator.vibrate?.([250,100,250])}
function startAlarm(){if(alarmOn)return;alarmOn=true;alarm.classList.add("show");state.textContent="警報中";statesub.textContent="目を開けてください";beep();timer=setInterval(beep,650)}
function stopAlarm(){alarmOn=false;alarm.classList.remove("show");clearInterval(timer);if(running&&!pulling){state.textContent="監視中";statesub.textContent="目の状態を確認しています"}}
function pullOver(){if(pulling)return;pulling=true;car.classList.add("pull");msg.textContent="安全確認後、路肩へ停止するシミュレーション";state.textContent="路肩へ移動中";statesub.textContent="画面内アニメーションです";setTimeout(()=>{msg.textContent="路肩に停止しました";state.textContent="停止";statesub.textContent="実車は操作していません";speed.textContent="0";slider.value="0"},2900);setTimeout(()=>{car.classList.remove("pull");msg.textContent="ルート案内中";pulling=false;if(running&&!alarmOn){state.textContent="監視中";statesub.textContent="目の状態を確認しています"}},7000)}
$("test").onclick=()=>{startAlarm();setTimeout(stopAlarm,3000)};$("pull").onclick=pullOver;window.addEventListener("pagehide",stop);
</script>
</body>
</html>
